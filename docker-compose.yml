# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yml — Control de Acceso QR (Evento 1800 personas)
#
#  Servicios:
#    - backend:  FastAPI + Uvicorn (Python 3.12)
#    - db:       PostgreSQL 16
#    - nginx:    Reverse proxy + SSL
#    - certbot:  Let's Encrypt (certificados automáticos)
#
#  Uso:
#    1. Copiar .env.example a .env y ajustar variables
#    2. docker compose up -d
#    3. bash init-letsencrypt.sh   (para HTTPS)
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-evento}:${POSTGRES_PASSWORD:-evento_pass}@db:5432/${POSTGRES_DB:-evento_db}"
      QR_IMAGES_DIR: /app/qr_codes
    volumes:
      - ./qr_codes:/app/qr_codes:ro           # Imágenes QR (read-only)
      - ./asistentes_import.csv:/app/data/asistentes_import.csv:ro  # CSV para seed
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: qr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-evento_db}"
      POSTGRES_USER: "${POSTGRES_USER:-evento}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-evento_pass}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Acceso local para administración (opcional)
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evento} -d ${POSTGRES_DB:-evento_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Nginx (Reverse Proxy) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app-network

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: qr-certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot:rw
      - ./nginx/certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; done'"
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
