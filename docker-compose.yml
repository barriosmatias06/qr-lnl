services:

  # ── Traefik (Reverse Proxy + Let's Encrypt) ────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: qr-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
    command:
      - "--api.dashboard=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-barriosmn06@gmail.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    networks:
      - app-network

  # ── Backend (FastAPI) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-evento}:${POSTGRES_PASSWORD:-evento_pass}@db:5432/${POSTGRES_DB:-evento_db}"
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Main domain: register page
      - "traefik.http.routers.register.rule=Host(`dominic.com.ar`)"
      - "traefik.http.routers.register.entrypoints=websecure"
      - "traefik.http.routers.register.tls.certresolver=letsencrypt"
      - "traefik.http.routers.register.service=register-svc"
      - "traefik.http.services.register-svc.loadbalancer.server.port=8000"
      # Panel subdomain: scanner + admin
      - "traefik.http.routers.panel.rule=Host(`panel.dominic.com.ar`)"
      - "traefik.http.routers.panel.entrypoints=websecure"
      - "traefik.http.routers.panel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.panel.service=panel-svc"
      - "traefik.http.services.panel-svc.loadbalancer.server.port=8000"
      # Admin subdomain: dashboard
      - "traefik.http.routers.admin.rule=Host(`admin.dominic.com.ar`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin.service=admin-svc"
      - "traefik.http.services.admin-svc.loadbalancer.server.port=8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: qr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-evento_db}"
      POSTGRES_USER: "${POSTGRES_USER:-evento}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-evento_pass}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evento} -d ${POSTGRES_DB:-evento_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
